<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormIQ — Intelligent Fitness</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
    <script>
      (function() {
        function showCrashBox(title, message, stack, details) {
          var container = document.getElementById('runtime-error-display');
          if (!container) {
            container = document.createElement('div');
            container.id = 'runtime-error-display';
            container.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background-color:#0c0d12;color:#ff4d4d;padding:30px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;z-index:999999;overflow:auto;box-sizing:border-box;border-top:6px solid #ef4444;';
            container.innerHTML = '<h1 style="font-size:24px;margin-top:0;color:#ef4444;font-weight:800;border-bottom:1px solid #2e303d;padding-bottom:15px;">⚠️ Application Load Failure (' + title + ')</h1>' +
                                  '<p style="color:#a1a1aa;font-size:14px;margin-bottom:20px;">A critical error occurred while starting or running the application. Check the details below to troubleshoot.</p>';
            document.body.appendChild(container);
          }
          var box = document.createElement('div');
          box.style = 'background-color:#18181b;border:1px solid #27272a;border-radius:8px;padding:20px;margin-bottom:20px;';
          var html = '<h3 style="margin-top:0;font-size:16px;color:#f4f4f5;font-weight:600;">' + message + '</h3>';
          if (details) {
            html += '<p style="color:#d4d4d8;font-size:13px;margin:5px 0;">' + details + '</p>';
          }
          if (stack) {
            html += '<pre style="white-space:pre-wrap;background-color:#09090b;padding:15px;border-radius:6px;border:1px solid #27272a;color:#e4e4e7;font-size:12px;line-height:1.6;margin-top:15px;overflow-x:auto;">' + stack + '</pre>';
          }
          box.innerHTML = html;
          container.appendChild(box);
        }

        window.addEventListener('error', function(event) {
          if (event.target && (event.target.src || event.target.href)) {
            showCrashBox('Resource Error', 'Failed to load resource: ' + (event.target.src || event.target.href), null, 'HTML Element: <' + event.target.tagName.toLowerCase() + '>');
          } else {
            showCrashBox('Runtime JavaScript Error', event.message || 'Unknown Javascript error', event.error ? event.error.stack : null, 'Location: ' + event.filename + ':' + event.lineno + ':' + event.colno);
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = reason ? (reason.message || String(reason)) : 'Unhandled Promise Rejection';
          var stack = (reason && reason.stack) ? reason.stack : null;
          showCrashBox('Promise Rejection', msg, stack, 'A Promise was rejected but there was no catch block to handle it.');
        });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="background-color:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;">
        <div style="font-size:24px;font-weight:bold;margin-bottom:10px;">FormIQ Loading</div>
        <div style="color:#6b7280;font-size:14px;">If you see this screen for a long time, check your browser developer tools console or look for error boxes.</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
